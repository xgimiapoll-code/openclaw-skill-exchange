app = "openclaw-skill-exchange"
primary_region = "nrt"  # Tokyo

[build]

[env]
  PORT = "8100"
  MARKET_LOG_FORMAT = "json"
  MARKET_LOG_LEVEL = "INFO"
  MARKET_CORS_ORIGINS = "*"

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
